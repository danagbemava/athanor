name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: API lint
        run: make api-lint
      - name: API test
        run: make api-test
      - name: API build
        run: make api-build

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: UI lint
        run: make ui-lint
      - name: UI test
        run: make ui-test
      - name: UI build
        run: make ui-build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Worker lint
        run: make worker-lint
      - name: Worker test
        run: make worker-test
      - name: Worker build
        run: make worker-build

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install spec dependencies
        run: npm --prefix packages/spec install
      - name: Validate schemas
        run: make schema-validate

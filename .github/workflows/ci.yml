name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker smoke test
        run: make compose-smoke
      - name: Check API image size
        run: test "$(docker image inspect athanor-api:local --format '{{.Size}}')" -lt 314572800
      - name: Check Worker image size
        run: test "$(docker image inspect athanor-worker:local --format '{{.Size}}')" -lt 52428800

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: API lint
        run: make api-lint
      - name: API test
        run: make api-test
      - name: Upload API coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-jacoco-report
          path: |
            apps/api/build/reports/jacoco/test/html
            apps/api/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: error
      - name: API build
        run: make api-build

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install UI dependencies
        run: npm --prefix apps/ui install
      - name: UI lint
        run: make ui-lint
      - name: UI test
        run: make ui-test
      - name: UI build
        run: make ui-build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Worker lint
        run: make worker-lint
      - name: Worker test
        run: make worker-test
      - name: Worker build
        run: make worker-build

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install spec dependencies
        run: npm --prefix packages/spec install
      - name: Validate schemas
        run: make schema-validate

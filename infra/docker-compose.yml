services:
  postgres:
    image: postgres:16
    container_name: athanor-postgres
    environment:
      POSTGRES_USER: athanor
      POSTGRES_PASSWORD: athanor
      POSTGRES_DB: athanor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: athanor-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: athanor-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: eclipse-temurin:21-jre
    container_name: athanor-api
    working_dir: /workspace
    command: ["sh", "-c", "echo 'API scaffold placeholder running'; sleep infinity"]
    environment:
      ATHANOR_DB_URL: jdbc:postgresql://postgres:5432/athanor
      ATHANOR_DB_USERNAME: athanor
      ATHANOR_DB_PASSWORD: athanor
      ATHANOR_DB_DRIVER: org.postgresql.Driver
      ATHANOR_REDIS_HOST: redis
      ATHANOR_REDIS_PORT: 6379
      ATHANOR_WORKER_RUNTIME_MODE: redis
      ATHANOR_S3_ENDPOINT: http://minio:9000
      ATHANOR_S3_BUCKET: athanor-bundles
      ATHANOR_S3_ACCESS_KEY: minioadmin
      ATHANOR_S3_SECRET_KEY: minioadmin
    volumes:
      - ../apps/api:/workspace
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: golang:1.22
    container_name: athanor-worker
    working_dir: /workspace
    command: ["sh", "-c", "echo 'Worker scaffold placeholder running'; sleep infinity"]
    environment:
      ATHANOR_REDIS_ADDR: redis:6379
      ATHANOR_S3_ENDPOINT: http://minio:9000
      ATHANOR_S3_BUCKET: athanor-bundles
      ATHANOR_S3_ACCESS_KEY: minioadmin
      ATHANOR_S3_SECRET_KEY: minioadmin
    volumes:
      - ../apps/worker:/workspace
    depends_on:
      - redis
      - minio

  minio-init:
    image: minio/mc:latest
    container_name: athanor-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/athanor-bundles
      "

volumes:
  postgres_data:
  minio_data:

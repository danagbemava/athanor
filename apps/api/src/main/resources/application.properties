spring.application.name=athanor-api
spring.datasource.url=${ATHANOR_DB_URL:jdbc:h2:mem:athanor;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${ATHANOR_DB_USERNAME:sa}
spring.datasource.password=${ATHANOR_DB_PASSWORD:}
spring.datasource.driver-class-name=${ATHANOR_DB_DRIVER:org.h2.Driver}
spring.flyway.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.access.default=unrestricted
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
athanor.bundle.storage.mode=${ATHANOR_BUNDLE_STORAGE_MODE:s3}
athanor.bundle.storage.filesystem-root=${ATHANOR_BUNDLE_FILESYSTEM_ROOT:build/athanor/bundles}
athanor.bundle.storage.s3.endpoint=${ATHANOR_S3_ENDPOINT:http://127.0.0.1:9000}
athanor.bundle.storage.s3.region=${ATHANOR_S3_REGION:us-east-1}
athanor.bundle.storage.s3.bucket=${ATHANOR_S3_BUCKET:athanor-bundles}
athanor.bundle.storage.s3.access-key=${ATHANOR_S3_ACCESS_KEY:minioadmin}
athanor.bundle.storage.s3.secret-key=${ATHANOR_S3_SECRET_KEY:minioadmin}
athanor.bundle.retention.enabled=${ATHANOR_BUNDLE_RETENTION_ENABLED:true}
athanor.bundle.retention.schedule=${ATHANOR_BUNDLE_RETENTION_SCHEDULE:0 0 2 * * *}
athanor.bundle.retention.draft-days=${ATHANOR_BUNDLE_RETENTION_DRAFT_DAYS:90}
athanor.bundle.retention.orphan-days=${ATHANOR_BUNDLE_RETENTION_ORPHAN_DAYS:7}
athanor.worker.cli.command=${ATHANOR_WORKER_CLI_COMMAND:go run ./cmd/worker}
athanor.worker.cli.working-directory=${ATHANOR_WORKER_CLI_WORKING_DIRECTORY:../worker}
